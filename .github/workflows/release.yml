name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Version aus Tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Swift Package auflösen
        run: swift package resolve

      - name: Release Build
        run: swift build -c release

      - name: App Bundle erstellen
        run: |
          APP=build/Jellyfish.app
          CONTENTS=$APP/Contents
          ARCH=$(uname -m)
          BUILD_DIR=.build/${ARCH}-apple-macosx/release

          rm -rf "$APP"
          mkdir -p "$CONTENTS/MacOS" "$CONTENTS/Resources"

          cp "$BUILD_DIR/Jellyfish" "$CONTENTS/MacOS/Jellyfish"

          [ -d "$BUILD_DIR/Jellyfish_Jellyfish.bundle" ] && \
            cp -R "$BUILD_DIR/Jellyfish_Jellyfish.bundle" "$CONTENTS/Resources/"

          cp Resources/*.icns "$CONTENTS/Resources/"

          sed \
            -e "s/\$(APP_VERSION)/${{ steps.version.outputs.VERSION }}/g" \
            -e "s/\$(BUILD_NUMBER)/${{ github.run_number }}/g" \
            Resources/Info.plist > "$CONTENTS/Info.plist"

          codesign --force --deep --sign - "$APP"

      - name: DMG erstellen
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          MOUNT=$(mktemp -d)

          hdiutil create -size 100m -volname "Jellyfish" -fs HFS+ -o build/Jellyfish_rw.dmg
          hdiutil attach -readwrite -noverify -noautoopen -mountpoint "$MOUNT" build/Jellyfish_rw.dmg

          ditto build/Jellyfish.app "$MOUNT/Jellyfish.app"
          ln -s /Applications "$MOUNT/Applications"

          hdiutil detach "$MOUNT"
          rmdir "$MOUNT"
          hdiutil convert build/Jellyfish_rw.dmg -format UDZO -o "build/Jellyfish-${VERSION}.dmg"
          rm -f build/Jellyfish_rw.dmg

      - name: GitHub Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Jellyfish ${{ steps.version.outputs.VERSION }}"
          body_path: release_notes.md
          files: build/Jellyfish-${{ steps.version.outputs.VERSION }}.dmg
